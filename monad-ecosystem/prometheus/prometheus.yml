# Prometheus scrape config — Vector 6.3 Observability
#
# Network mode: network_mode=host throughout
# All services bind to localhost. Prometheus scrapes localhost directly.
#
# Override targets via PROMETHEUS_TARGETS env var at compose time if needed.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # sovereign-host — main metrics + Kafka bridge export
  - job_name: sovereign-host
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:3001
        labels:
          organism: sovereign-monad
          component: host

  # hep-engine — optional additional scrape target
  - job_name: hepar-engine
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:3003
        labels:
          organism: sovereign-monad
          component: hepar
