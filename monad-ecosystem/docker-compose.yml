# Sovereign Monad Ecosystem — Docker Compose
#
# Final Sequence: The Breath (see docs/GO_LIVE_EXECUTION.md)
#
# Usage (from this directory):
#   cp .env.production.example .env.production   # fill secrets — never commit
#   docker compose --env-file .env.production --profile with-kafka up -d --build
#   docker compose --env-file .env.production --profile observability up -d
#   curl -s http://localhost:3001/health | jq .
#
# Profiles:
#   with-kafka     — in-compose Kafka
#   observability  — Prometheus + Grafana
#   full           — observability alias
#
# Network: network_mode=host throughout
#   All services communicate via localhost on the host network namespace.
#   This is REQUIRED for the sovereign-host to reach Azure MSI (169.254.169.254)
#   when running inside Docker on an Azure VM. Container ports are declared for
#   documentation; Docker ignores them in host network mode.
#
services:
  # ═══════════════════════════════════════════════════════════════════════════
  # Sovereign Host (API + Cardia SSE + metrics + key custody)
  # ═══════════════════════════════════════════════════════════════════════════
  sovereign-host:
    build:
      context: ../..
      dockerfile: monad-ecosystem/packages/sovereign-host/Dockerfile
    container_name: sovereign-host
    # Ports ignored in host network mode; declared for documentation.
    ports:
      - "3001:3001"
    env_file:
      - path: .env.production
        required: false
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=${FRONTEND_URL:-https://app.yourdomain.com}

      # Cosmos
      - MONAD_RPC_URL=${MONAD_RPC_URL:-https://rpc.testnet.monad.xyz}
      - MONAD_CHAIN_ID=${MONAD_CHAIN_ID:-10143}
      - STABLECOIN_CONTRACT=${STABLECOIN_CONTRACT:-}

      # Live capital (default false)
      - CARDIA_FUNDING_LIVE=${CARDIA_FUNDING_LIVE:-false}
      - YIELD_ROUTER_LIVE=${YIELD_ROUTER_LIVE:-false}

      # Router B sinks
      - PRINCIPAL_TREASURY=${PRINCIPAL_TREASURY:-0x0000000000000000000000000000000000000000}
      - SHALIAH_TREASURY=${SHALIAH_TREASURY:-0x0000000000000000000000000000000000000000}
      - ECOSYSTEM_VAULT=${ECOSYSTEM_VAULT:-0x0000000000000000000000000000000000000000}

      # Nervous system (localhost — all services on host network)
      - KAFKA_ENABLED=${KAFKA_ENABLED:-false}
      - KAFKA_BROKERS=${KAFKA_BROKERS:-localhost:9092}
      - KAFKA_SASL_USERNAME=${KAFKA_SASL_USERNAME:-}
      - KAFKA_SASL_PASSWORD=${KAFKA_SASL_PASSWORD:-}
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379}

      # Forensic gates (localhost)
      - HEPAR_API_URL=${HEPAR_API_URL:-http://localhost:3003/api/v1/hepar}
      - HEPAR_AUDIT_MODE=${HEPAR_AUDIT_MODE:-http}
      - HEPAR_API_KEY=${HEPAR_API_KEY:-}
      - SHADOW_API_URL=${SHADOW_API_URL:-http://localhost:8000/api/v1/shadow/evaluate}

      # Key custody
      - KEY_VAULT_NAME=${KEY_VAULT_NAME:-}
      # Dev only — BOOTSTRAP_PRIVATE_KEY from env_file, not overridden here
    network_mode: host
    depends_on:
      redis:
        condition: service_healthy
      hepar-engine:
        condition: service_healthy
      python-engine:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ═══════════════════════════════════════════════════════════════════════════
  # Hepar Engine — True TypeScript forensic chain scanner (A→B→C→D)
  # ═══════════════════════════════════════════════════════════════════════════
  hepar-engine:
    build:
      context: ../..
      dockerfile: monad-ecosystem/packages/hepar-service/Dockerfile
    container_name: sovereign-hepar
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=production
      - PORT=3003
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ═══════════════════════════════════════════════════════════════════════════
  # Python Engine (FastAPI + Shadow Markout)
  # ═══════════════════════════════════════════════════════════════════════════
  python-engine:
    build:
      context: ../..
      dockerfile: monad-ecosystem/packages/monad-mev/python/Dockerfile
    container_name: python-engine
    ports:
      - "8000:8000"
    environment:
      - PYTHON_ENV=production
    network_mode: host
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ═══════════════════════════════════════════════════════════════════════════
  # Redis: Nonce Manager & Cache (Nervous System)
  # ═══════════════════════════════════════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: sovereign-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    network_mode: host
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ═══════════════════════════════════════════════════════════════════════════
  # Kafka: Event Bus (Optional — enable with --profile with-kafka)
  # ═══════════════════════════════════════════════════════════════════════════
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: sovereign-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # host network mode → localhost, not kafka hostname
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped
    network_mode: host
    profiles:
      - with-kafka
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # Observability (Vector 6.3) — Prometheus + Grafana
  # ═══════════════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: sovereign-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    restart: unless-stopped
    network_mode: host
    depends_on:
      - sovereign-host
    profiles:
      - observability
      - full

  grafana:
    image: grafana/grafana:11.2.0
    container_name: sovereign-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-sovereign}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost:3000}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboard.json:/var/lib/grafana/dashboards/sovereign-organism.json:ro
      - grafana-data:/var/lib/grafana
    restart: unless-stopped
    network_mode: host
    depends_on:
      - prometheus
    profiles:
      - observability
      - full

# ═══════════════════════════════════════════════════════════════════════════
# Networks — not used with network_mode=host; kept for reference.
# All inter-service communication is via localhost on the host network.
# ═══════════════════════════════════════════════════════════════════════════
networks:
  sovereign-net:
    driver: bridge

# ═══════════════════════════════════════════════════════════════════════════
# Volumes
# ═══════════════════════════════════════════════════════════════════════════
volumes:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
