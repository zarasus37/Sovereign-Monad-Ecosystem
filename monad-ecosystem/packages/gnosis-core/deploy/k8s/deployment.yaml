apiVersion: apps/v1
kind: Deployment
metadata:
  name: sovereign-agent-registry
  namespace: sovereign
  labels:
    app.kubernetes.io/name: sovereign-agent-registry
    app.kubernetes.io/component: agent-registry
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: sovereign-agent-registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sovereign-agent-registry
        app.kubernetes.io/component: agent-registry
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        - name: fetch-agents
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              wget -q -O /data/agents.json "${AGENTS_SOURCE_URL}" || (
                echo "Failed to fetch agents.json from ${AGENTS_SOURCE_URL}" && exit 1
              )
          env:
            - name: AGENTS_SOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: sovereign-agent-registry
                  key: agents-source-url
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      containers:
        - name: registry
          image: sovereign-agent-registry:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: REGISTRY_PORT
              value: "8080"
            - name: REGISTRY_DATA_PATH
              value: /data/agents.json
            - name: REGISTRY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sovereign-agent-registry
                  key: auth-token
                  optional: true
          volumeMounts:
            - name: data
              mountPath: /data
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: data
          emptyDir: {}
