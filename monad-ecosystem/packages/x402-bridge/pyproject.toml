[build-system]
requires = ["poetry-core>=1.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry]
name = "x402-bridge"
version = "0.1.0"
description = "Sovereign x402 payment bridge — QuickNode client, auth flow, and live smoke test"
authors = ["Sovereign Team"]
packages = [{ include = "x402_bridge", from = "src" }]

[tool.poetry.dependencies]
python = "^3.10"
httpx = "^0.27.0"
eth-account = "^0.13.0"

[tool.poetry.group.dev.dependencies]
pytest = "^7.0.0"

[tool.pytest.ini_options]
testpaths = ["tests"]
