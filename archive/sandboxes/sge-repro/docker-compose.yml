version: '3.8'
services:
  api:
    build: .
    command: uvicorn src.intake.api.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SGE_STRUCT_READ_THRESHOLD=0.85
    depends_on:
      - redis
  worker:
    build: .
    command: python -u src/intake/worker/main.py
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
  redis:
    image: redis:7
    ports:
      - "6379:6379"
