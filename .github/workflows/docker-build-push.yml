name: Build and Push Docker Images to ACR

on:
  push:
    branches:
      - main
    paths:
      - 'monad-ecosystem/packages/sovereign-host/**'
      - 'monad-ecosystem/packages/hepar-service/**'
      - 'monad-ecosystem/packages/monad-mev/**'
      - 'monad-ecosystem/packages/prometheus/**'
  workflow_dispatch:

env:
  REGISTRY: sovereigncr20260721.azurecr.io

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # sovereign-host — heaviest build, runs first and alone to avoid OOM
  # ─────────────────────────────────────────────────────────────────────────────
  sovereign-host:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/sovereign-host
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push sovereign-host
        uses: docker/build-push-action@v6
        with:
          context: .
          file: monad-ecosystem/packages/sovereign-host/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache-filters: |
            node_modules
            .pnpm-store
          provenance: false
  # ─────────────────────────────────────────────────────────────────────────────
  # hepar-service and monad-mev — run after sovereign-host succeeds
  # ─────────────────────────────────────────────────────────────────────────────
  supporting-services:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: sovereign-host
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: hepar-service
            dockerfile: monad-ecosystem/packages/hepar-service/Dockerfile
            context: .

          - image: monad-mev
            dockerfile: monad-ecosystem/packages/monad-mev/python/Dockerfile
            context: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache-filters: |
            node_modules
            .pnpm-store
          provenance: false

  # ─────────────────────────────────────────────────────────────────────────────
  # prometheus — scrape config for sovereign-host metrics
  # ─────────────────────────────────────────────────────────────────────────────
  prometheus:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/prometheus
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      - name: Build and push prometheus
        uses: docker/build-push-action@v6
        with:
          context: monad-ecosystem/packages/prometheus
          file: monad-ecosystem/packages/prometheus/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false