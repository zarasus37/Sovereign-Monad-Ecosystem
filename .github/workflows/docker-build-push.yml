name: Build and Push Docker Images to ACR

on:
  push:
    branches:
      - main
    paths:
      - 'monad-ecosystem/packages/sovereign-host/**'
      - 'monad-ecosystem/packages/hepar-service/**'
      - 'monad-ecosystem/packages/monad-mev/**'
  workflow_dispatch:
    inputs:
      images:
        description: 'Images to build (comma-separated): sovereign-host,hepar-service,monad-mev'
        required: false
        default: 'sovereign-host,hepar-service,monad-mev'

env:
  REGISTRY: sovereigncr20260721.azurecr.io

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - image: sovereign-host
            dockerfile: monad-ecosystem/packages/sovereign-host/Dockerfile
            context: .
            tags: latest

          - image: hepar-service
            dockerfile: monad-ecosystem/packages/hepar-service/Dockerfile
            context: .
            tags: latest

          - image: monad-mev
            dockerfile: monad-ecosystem/packages/monad-mev/python/Dockerfile
            context: .
            tags: latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clear GHA build cache
        run: |
          for id in $(gh cache list --limit 10 --jq '.[].id'); do
            gh cache delete "$id" 2>/dev/null || true
          done

      - name: Login to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for ${{ matrix.image }}
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=${{ matrix.tags }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache-fallback: true

      - name: Image digest
        run: |
          echo "✓ Image ${{ env.REGISTRY }}/${{ matrix.image }}:${{ matrix.tags }} pushed"
